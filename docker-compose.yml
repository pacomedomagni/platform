
services:
  postgres:
    image: postgres:16-alpine
    container_name: noslag_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noslag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noslag_password}
      POSTGRES_DB: ${POSTGRES_DB:-noslag_db}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - ./docker/postgres_data:/var/lib/postgresql/data
      - ./docker/postgres_init:/docker-entrypoint-initdb.d
    networks:
      - noslag_network

  redis:
    image: redis:alpine
    container_name: noslag_redis
    restart: always
    ports:
      - '127.0.0.1:6379:6379'
    networks:
      - noslag_network

  minio:
    image: minio/minio:latest
    container_name: noslag_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - ./docker/minio_data:/data
    networks:
      - noslag_network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: noslag_keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL:-jdbc:postgresql://noslag_postgres:5432/keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./docker/keycloak/noslag-realm.json:/opt/keycloak/data/import/noslag-realm.json
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - postgres
    networks:
      - noslag_network

  traefik:
    image: traefik:v3.0
    container_name: noslag_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:8081:8080" # Dashboard (insecure; dev only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - noslag_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: platform-api
    container_name: noslag_api
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://noslag:noslag_password@noslag_postgres:5432/noslag_db?schema=public}
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql://noslag:noslag_password@noslag_postgres:5432/noslag_db?schema=public}
      REDIS_HOST: noslag_redis
      REDIS_PORT: "6379"
      REDIS_URL: ${REDIS_URL:-redis://noslag_redis:6379}
      KEYCLOAK_JWKS_URI: ${KEYCLOAK_JWKS_URI:-http://noslag_keycloak:8080/realms/noslag/protocol/openid-connect/certs}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8080/realms/noslag}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-local-dev-encryption-key-change-in-production}
      ALLOW_TENANT_HEADER: "true"
      S3_ENDPOINT: http://noslag_minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: noslag-uploads
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      DOMAIN: ${DOMAIN:-noslag.com}
      MOCK_PAYMENTS: "true"
      SENDGRID_WEBHOOK_VERIFICATION_KEY: ${SENDGRID_WEBHOOK_VERIFICATION_KEY:-local-dev-placeholder}
      PROVISION_API_KEY: ${PROVISION_API_KEY:-local-dev-provision-key}
      ENABLE_DEV_PASSWORD_LOGIN: "true"
      MOCK_EXTERNAL_SERVICES: "true"
      EBAY_APP_ID: mock-ebay-app-id
      EBAY_CERT_ID: mock-ebay-cert-id
      EBAY_RU_NAME: mock-ebay-ru-name
      EBAY_SANDBOX: "true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.noslag-api.rule=Host(`api.localhost`) || PathPrefix(`/api`)"
      - "traefik.http.services.noslag-api.loadbalancer.server.port=3000"
      - "logging=promtail"
      - "environment=${NODE_ENV:-production}"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - postgres
      - redis
      - keycloak
    networks:
      - noslag_network

  # Optional: For database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: noslag_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@noslag.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - '127.0.0.1:5050:80'
    networks:
      - noslag_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Bake the API hostname into Next.js's compiled rewrites. Next 16
        # evaluates next.config.js `rewrites()` at build time, so this
        # has to be a build arg, not a runtime env var.
        API_INTERNAL_URL: http://noslag_api:3000
    image: platform-web
    container_name: noslag_web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      API_INTERNAL_URL: http://noslag_api:3000
    ports:
      - "127.0.0.1:4200:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.noslag-web.rule=Host(`localhost`)"
      - "traefik.http.services.noslag-web.loadbalancer.server.port=3000"
    depends_on:
      - api
    networks:
      - noslag_network

  # ===== Observability Stack =====
  
  loki:
    image: grafana/loki:2.9.4
    container_name: noslag_loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./docker/loki_data:/loki
    networks:
      - noslag_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.4
    container_name: noslag_promtail
    restart: always
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/logs:/var/log/platform:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - noslag_network

networks:
  noslag_network:
    driver: bridge
