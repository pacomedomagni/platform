# NoSlag Platform — Droplet Staging Deployment
# Host: 104.248.51.126 (loni-server)
# Port range: 60xx (Loni=80/443/7000, Restorae=40xx, HavenKeep=8xxx)
#
# Usage:
#   docker compose -f docker-compose.droplet.yml up -d
#   docker compose -f docker-compose.droplet.yml down

services:
  postgres:
    image: postgres:16-alpine
    container_name: noslag-stg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noslag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noslag_staging_pw}
      POSTGRES_DB: ${POSTGRES_DB:-noslag_db}
    ports:
      - "6032:5432"
    volumes:
      - noslag_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noslag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - noslag

  redis:
    image: redis:7-alpine
    container_name: noslag-stg-redis
    restart: unless-stopped
    ports:
      - "6079:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - noslag

  minio:
    image: minio/minio:latest
    container_name: noslag-stg-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "6090:9000"
      - "6091:9001"
    volumes:
      - noslag_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - noslag

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: noslag-stg-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://noslag-stg-postgres:5432/${POSTGRES_DB:-noslag_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-noslag}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-noslag_staging_pw}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "6080:8080"
    volumes:
      - ./docker/keycloak/noslag-realm.json:/opt/keycloak/data/import/noslag-realm.json
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - noslag

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: noslag-api:staging
    container_name: noslag-stg-api
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-noslag}:${POSTGRES_PASSWORD:-noslag_staging_pw}@noslag-stg-postgres:5432/${POSTGRES_DB:-noslag_db}?schema=public
      APP_DATABASE_URL: postgresql://app_user:app_password@noslag-stg-postgres:5432/${POSTGRES_DB:-noslag_db}?schema=public
      REDIS_URL: redis://noslag-stg-redis:6379
      KEYCLOAK_JWKS_URI: http://noslag-stg-keycloak:8080/realms/noslag/protocol/openid-connect/certs
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://104.248.51.126:6080/realms/noslag}
      JWT_SECRET: ${JWT_SECRET:-noslag-staging-jwt-secret-change-me}
      MINIO_ENDPOINT: noslag-stg-minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-noslag-uploads}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EBAY_SANDBOX: ${EBAY_SANDBOX:-true}
      EBAY_APP_ID: ${EBAY_APP_ID:-}
      EBAY_CERT_ID: ${EBAY_CERT_ID:-}
      EBAY_DEV_ID: ${EBAY_DEV_ID:-}
      EBAY_RU_NAME: ${EBAY_RU_NAME:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-noslag-staging-encryption-key-change-me}
      LOG_LEVEL: debug
    ports:
      - "6000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - noslag

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://104.248.51.126:6000/api/v1}
    image: noslag-web:staging
    container_name: noslag-stg-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://104.248.51.126:6000/api/v1}
    ports:
      - "6001:3000"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - noslag

networks:
  noslag:
    driver: bridge

volumes:
  noslag_postgres_data:
  noslag_minio_data:
