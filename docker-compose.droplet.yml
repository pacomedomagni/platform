# NoSlag Platform — Droplet Staging Deployment
# Host: 104.248.51.126 (loni-server)
# Port range: 60xx (Loni=80/443/7000, Restorae=40xx, HavenKeep=8xxx)
#
# Usage:
#   docker compose -f docker-compose.droplet.yml --env-file .env up -d
#   docker compose -f docker-compose.droplet.yml --env-file .env down

services:
  postgres:
    image: postgres:16-alpine
    container_name: noslag-stg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noslag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-noslag_db}
    ports:
      - "6032:5432"
    volumes:
      - noslag_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-noslag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - noslag

  redis:
    image: redis:7-alpine
    container_name: noslag-stg-redis
    restart: unless-stopped
    ports:
      - "6079:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - noslag

  minio:
    image: minio/minio:latest
    container_name: noslag-stg-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "6090:9000"
      - "6091:9001"
    volumes:
      - noslag_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - noslag

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: noslag-stg-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://noslag-stg-postgres:5432/${POSTGRES_DB:-noslag_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-noslag}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "6080:8080"
    volumes:
      - ./docker/keycloak/noslag-realm.json:/opt/keycloak/data/import/noslag-realm.json
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - noslag

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: noslag-api:staging
    container_name: noslag-stg-api
    restart: unless-stopped
    environment:
      # Core
      NODE_ENV: staging
      PORT: 3000
      LOG_LEVEL: debug
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DOMAIN: ${DOMAIN:-noslag.com}
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-noslag}:${POSTGRES_PASSWORD}@noslag-stg-postgres:5432/${POSTGRES_DB:-noslag_db}?schema=public
      # Redis
      REDIS_HOST: noslag-stg-redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://noslag-stg-redis:6379
      # Auth
      KEYCLOAK_JWKS_URI: http://noslag-stg-keycloak:8080/realms/noslag/protocol/openid-connect/certs
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://104.248.51.126:6080/realms/noslag}
      JWT_SECRET: ${JWT_SECRET}
      ENABLE_DEV_PASSWORD_LOGIN: "true"
      ALLOW_TENANT_HEADER: "true"
      PROVISION_API_KEY: ${PROVISION_API_KEY:-}
      # Storage (S3/MinIO) — these are the vars app.module.ts actually reads
      S3_ENDPOINT: http://noslag-stg-minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-noslag-uploads}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-http://104.248.51.126:6001}
      STORE_URL: ${STORE_URL:-http://104.248.51.126:6001/storefront}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://104.248.51.126:6001,http://104.248.51.126:6000}
      # Payments
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CONNECT_WEBHOOK_SECRET: ${STRIPE_CONNECT_WEBHOOK_SECRET:-}
      # Email
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-noreply@noslag.com}
      # Marketplace
      EBAY_SANDBOX: ${EBAY_SANDBOX:-true}
      EBAY_APP_ID: ${EBAY_APP_ID:-}
      EBAY_CERT_ID: ${EBAY_CERT_ID:-}
      EBAY_DEV_ID: ${EBAY_DEV_ID:-}
      EBAY_RU_NAME: ${EBAY_RU_NAME:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SQUARE_APPLICATION_ID: ${SQUARE_APPLICATION_ID:-}
      SQUARE_APPLICATION_SECRET: ${SQUARE_APPLICATION_SECRET:-}
      SQUARE_ENVIRONMENT: ${SQUARE_ENVIRONMENT:-sandbox}
      # Seeder
      SYNC_CORE_DOCTYPES: "true"
    labels:
      - "logging=promtail"
      - "environment=staging"
    ports:
      - "6000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - noslag

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://104.248.51.126:6000/api/v1}
    image: noslag-web:staging
    container_name: noslag-stg-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://104.248.51.126:6000/api/v1}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://104.248.51.126:6001}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://104.248.51.126:6001}
      NEXT_PUBLIC_DEFAULT_CURRENCY: ${NEXT_PUBLIC_DEFAULT_CURRENCY:-USD}
    ports:
      - "6001:3000"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
    networks:
      - noslag

  loki:
    image: grafana/loki:2.9.4
    container_name: noslag-stg-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:6100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - noslag_loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    networks:
      - noslag

  promtail:
    image: grafana/promtail:2.9.4
    container_name: noslag-stg-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.15'
    networks:
      - noslag

networks:
  noslag:
    driver: bridge

volumes:
  noslag_postgres_data:
  noslag_minio_data:
  noslag_loki_data:
